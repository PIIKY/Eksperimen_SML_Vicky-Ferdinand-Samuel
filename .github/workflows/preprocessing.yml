name: Credit Risk Preprocessing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run preprocessing automation
        working-directory: preprocessing
        run: |
          python automate_Vicky-Ferdinand-Samuel.py \
            --input ../dataset_raw/credit_risk_dataset.csv.zip \
            --output dataset_preprocessing

      - name: Validate preprocessing outputs
        run: |
          test -f preprocessing/dataset_preprocessing/credit_risk_train.csv
          test -f preprocessing/dataset_preprocessing/credit_risk_test.csv
          test -f preprocessing/dataset_preprocessing/credit_risk_processed.csv
          python - <<'PY'
          import pandas as pd

          train = pd.read_csv("preprocessing/dataset_preprocessing/credit_risk_train.csv")
          test = pd.read_csv("preprocessing/dataset_preprocessing/credit_risk_test.csv")
          processed = pd.read_csv("preprocessing/dataset_preprocessing/credit_risk_processed.csv")

          assert train.shape == (25927, 20), train.shape
          assert test.shape == (6482, 20), test.shape
          assert processed.shape == (32409, 20), processed.shape
          assert "loan_status" in train.columns
          assert train.columns[-1] == "loan_status"
          print("Preprocessing outputs are valid.")
          PY

      - name: Upload preprocessing dataset
        uses: actions/upload-artifact@v4
        with:
          name: credit-risk-dataset-preprocessing
          path: preprocessing/dataset_preprocessing/
          if-no-files-found: error
